<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERAS Pocket Guide</title>
    <style>
        /* Essential styles for the layout to show up */
        body { font-family: sans-serif; display: flex; margin: 0; height: 100vh; }
        #sidebar { width: 250px; border-right: 1px solid #ddd; padding: 10px; overflow-y: auto; }
        #main-content { flex: 1; padding: 20px; overflow-y: auto; }
        .status { padding: 5px 10px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; }
        .status.ok { background: #e6fffa; color: #2c7a7b; }
        .status.saving { background: #fffaf0; color: #9c4221; }
        .status.err { background: #fff5f5; color: #c53030; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="status-area"></div>
        <div class="sb-scroll"></div>
    </div>

    <div id="main-content" class="main">
        <div class="empty">Loading protocols...</div>
    </div>

    <script>
        // 1. CONFIGURATION
        const JSONBIN_BIN_ID = 'YOUR_BIN_ID_HERE';
        const JSONBIN_API_KEY = 'YOUR_API_KEY_HERE';

        // 2. GLOBAL STATE
        let protocols = [];
        let curPid = null;
        let curPhase = 'preoperative';

        // 3. UTILITIES
        function setStatus(type, text) {
            const statusEl = document.getElementById('status-area');
            if (!statusEl) return;
            const typeMap = { 'ok': 'ok', 'saving': 'saving', 'error': 'err', 'err': 'err' };
            const className = typeMap[type] || 'saving';
            statusEl.innerHTML = `<div class="status ${className}">${text}</div>`;
        }

        // 4. CORE LOGIC
        async function initApp() {
            setStatus('saving', 'Syncing with cloud...');
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });

                if (!response.ok) throw new Error('Cloud fetch failed');

                const data = await response.json();
                // Check both possible JSONBin structures
                protocols = data.record.protocols || data.record;

                if (protocols.length > 0) curPid = protocols[0].id;

                setStatus('ok', 'Cloud Sync Active');
            } catch (err) {
                console.warn("Falling back to local file:", err);
                try {
                    const local = await fetch('./protocols.json');
                    const localData = await local.json();
                    protocols = localData.protocols;
                    if (protocols.length > 0) curPid = protocols[0].id;
                    setStatus('ok', 'Running Local (Offline)');
                } catch (localErr) {
                    setStatus('err', 'Failed to load any data');
                }
            }
            renderSidebar();
            renderMain();
        }

        function renderSidebar() {
            const sb = document.querySelector('.sb-scroll');
            if (!sb) return;

            let html = '';
            protocols.forEach(p => {
                const isActive = p.id === curPid;
                html += `
                    <div class="sb-proto" style="cursor:pointer; padding:10px; border-bottom:1px solid #eee;">
                        <div onclick="selectProto(${p.id})" style="font-weight:${isActive ? 'bold' : 'normal'}">
                            ${p.name}
                        </div>
                    </div>
                `;
            });
            sb.innerHTML = html;
        }

        function renderMain() {
            const main = document.querySelector('.main');
            if (!main || protocols.length === 0) return;

            const p = protocols.find(x => x.id === curPid) || protocols[0];
            const phaseData = p.phases[curPhase] || {};

            let html = `
                <h2>${p.name}</h2>
                <p>${p.description}</p>
                <div style="margin: 15px 0;">
                    ${Object.keys(p.phases).map(ph => `
                        <button onclick="selectPhase('${ph}')" style="font-weight:${curPhase === ph ? 'bold' : 'normal'}">
                            ${ph.toUpperCase()}
                        </button>
                    `).join(' ')}
                </div>
            `;

            for (const section in phaseData) {
                html += `<h3>${section}</h3>`;
                phaseData[section].forEach(iv => {
                    html += `
                        <div style="margin-bottom:10px; padding:10px; background:#f9f9f9;">
                            <strong>${iv.name}</strong><br>
                            <small>${iv.summary}</small>
                        </div>
                    `;
                });
            }
            main.innerHTML = html;
        }

        function selectProto(id) { curPid = id; renderSidebar(); renderMain(); }
        function selectPhase(ph) { curPhase = ph; renderMain(); }

        // Start the app
        initApp();
    </script>
</body>
</html>
