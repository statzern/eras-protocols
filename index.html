<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERAS Pocket Guide</title>
    </head>
<body>
    <div id="app">
        </div>

    <script>
    // CONFIGURATION: Replace with your actual JSONBin details
const JSONBIN_BIN_ID = '69c41751b7ec241ddca1add6';
const JSONBIN_API_KEY = '$2a$10$AjQEh3KkVoufT5BTqyCazemisCPpV3iIX5i6G.1U43QZdUDER2aDC';

let protocols = [];

/**
 * Updates the visual status badge in the top bar.
 * @param {string} type - The status type ('ok', 'saving', or 'err').
 * @param {string} text - The text to display in the badge.
 */
function setStatus(type, text) {
    const statusEl = document.getElementById('status-area');
    if (!statusEl) return;

    // Map internal types to CSS classes used in your style block
    const typeMap = { 'ok': 'ok', 'saving': 'saving', 'error': 'err', 'err': 'err' };
    const className = typeMap[type] || 'saving';

    statusEl.innerHTML = `
        <div class="status ${className}">
            <div class="status-dot"></div>
            ${text}
        </div>
    `;
}

/**
 * Renders the sidebar navigation with protocol list and phases.
 */
function renderSidebar() {
    const sb = document.querySelector('.sb-scroll');
    if (!sb) return;

    let html = '';
    protocols.forEach(p => {
        const isActive = p.id === curPid;
        const phases = Object.keys(p.phases || {});

        html += `
            <div class="sb-proto">
                <div class="sb-proto-hdr ${isActive ? 'active' : ''}" onclick="selectProto(${p.id})">
                    <div class="sb-dot" style="background:${p.color || 'var(--indigo)'}"></div>
                    <div class="sb-proto-name">${p.name}</div>
                </div>
                ${isActive ? `
                    <div class="sb-phases">
                        ${phases.map(ph => `
                            <div class="sb-phase ${curPhase === ph ? 'active' : ''}" onclick="selectPhase('${ph}')">
                                <div class="sb-phase-pip"></div>
                                ${ph.charAt(0).toUpperCase() + ph.slice(1)}
                            </div>
                        `).join('')}
                    </div>
                ` : ''}
            </div>
        `;
    });
    sb.innerHTML = html;
}

/**
 * Renders the main content area based on the selected protocol and phase.
 */
function renderMain() {
    const main = document.querySelector('.main');
    if (!main || !protocols.length) return;

    const p = protocols.find(x => x.id === curPid) || protocols[0];
    if (!curPid) curPid = p.id;

    const phaseData = p.phases[curPhase] || {};
    const sections = Object.keys(phaseData);

    let html = `
        <div class="page-hdr">
            <div>
                <div class="page-title">${p.name}</div>
                <div class="page-sub">${p.description}</div>
            </div>
        </div>
        <div class="chips">
            ${Object.keys(p.phases).map(ph => `
                <div class="chip ${curPhase === ph ? 'active' : ''}" onclick="selectPhase('${ph}')">
                    ${ph.toUpperCase()}
                </div>
            `).join('')}
        </div>
    `;

    if (sections.length === 0) {
        html += `<div class="empty">No interventions defined for this phase.</div>`;
    } else {
        sections.forEach(sec => {
            html += `
                <div class="sec-block">
                    <div class="sec-block-hdr">
                        <div class="sec-block-title">${sec}</div>
                    </div>
                    ${phaseData[sec].map(iv => `
                        <div class="iv-row" onclick="viewIntervention('${sec}', '${iv.name}')">
                            <div class="iv-info">
                                <div class="iv-name">${iv.name}</div>
                                <div class="iv-desc">${iv.summary || ''}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        });
    }
    main.innerHTML = html;
}

// Ensure global state variables are defined at the top of your script
let curPid = null;
let curPhase = 'preoperative';

function selectProto(id) { curPid = id; renderSidebar(); renderMain(); }
function selectPhase(ph) { curPhase = ph; renderSidebar(); renderMain(); }

async function initApp() {
setStatus('saving', 'Syncing with cloud...');
try {
    const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });

    if (!response.ok) throw new Error('Cloud fetch failed');

    const data = await response.json();
    // JSONBin returns data inside a 'record' property
    protocols = data.record.protocols || data.record;
    setStatus('ok', 'Cloud Sync Active');
} catch (err) {
    console.warn("JSONBin error, falling back to local file:", err);
    const local = await fetch('./protocols.json');
    const localData = await local.json();
    protocols = localData.protocols;
    setStatus('ok', 'Running Local Version');
}
renderSidebar();
renderMain();
}

        // ... [Rest of your rendering logic from index.html] ...

        initApp();
    </script>
</body>
</html>
